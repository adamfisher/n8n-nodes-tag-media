name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip libimage-exiftool-perl
          pip3 install mutagen python-docx openpyxl python-pptx

      - name: Run tests
        run: npm test
